name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Quality Check & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Required for git log on markdown files

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # PR-only: placeholder for additional PR validation (e.g., bundle-size diff, visual regression)
      - name: PR Validation
        if: github.event_name == 'pull_request'
        run: echo "PR-specific validation passed"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: out/
          retention-days: 1

  deploy:
    name: "Deploy to Cloudflare Pages: ${{ github.event_name == 'pull_request' && 'Preview' || 'Production' }}"
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    environment:
      name: ${{ github.event_name == 'pull_request' && 'Preview' || 'Production' }}
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: build-output
          path: out/

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./out --project-name=cantonese-md --branch=${{ github.event_name == 'pull_request' && github.head_ref || 'main' }}

      - name: Purge Cloudflare Cache via API
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          RESPONSE=$(curl -sf -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -d '{"purge_everything":true}')

          if ! echo "$RESPONSE" | grep -q '"success":true'; then
            echo "::error::Cache purge failed: $RESPONSE"
            exit 1
          fi
          echo "Cache purged successfully"
